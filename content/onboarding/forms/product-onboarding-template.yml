form_id: product-onboarding
title: Product Onboarding Template
status: approved

rendering:
  template: page.onboarding
  section: rbp-onboarding-form

submission:
  handler: app_proxy
  method: post
  destination: /apps/rbp-bridge
  success_redirect: /pages/thank-you
  error_mode: inline

bridge_payload:
  sourceArea: products
  formType: product-onboarding

fields:
  - id: contact_name
    label: Contact name
    type: text
    required: true
    payload_target: name

  - id: email
    label: Email address
    type: email
    required: true
    payload_target: email

  - id: order_number
    label: Order number
    type: text
    required: false
    payload_target: metadata[order_number]
