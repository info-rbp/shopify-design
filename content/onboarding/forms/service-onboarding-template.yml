form_id: service-onboarding
title: Service Onboarding Template
status: approved

rendering:
  template: page.onboarding
  section: rbp-onboarding-form

submission:
  handler: app_proxy
  method: post
  destination: /apps/rbp-bridge
  success_redirect: /pages/thank-you
  error_mode: inline

bridge_payload:
  sourceArea: core_services
  formType: service-onboarding

fields:
  - id: business_name
    label: Business name
    type: text
    required: true
    payload_target: metadata[business_name]

  - id: contact_name
    label: Contact name
    type: text
    required: true
    payload_target: name

  - id: email
    label: Email address
    type: email
    required: true
    payload_target: email
